name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch: # Добавляет кнопку "Run workflow" в GitHub с выбором ветки

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 94.130.111.231
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            cd /var/www/attorney-site
            
            # Получаем изменения, переключаемся на выбранную ветку и подтягиваем её
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            cd frontend
            npm install
            npm run build
            cd ..

            pm2 restart lawyer-nuxt
            pm2 restart lawyer-api
