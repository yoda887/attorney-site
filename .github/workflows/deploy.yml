name: Deploy to Hetzner

on:
  push:
    # Можно использовать '*' для всех веток, либо перечислить конкретные:
    branches: 
      - main
      - dev
      - 'feature/*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          # Получаем имя ветки, которая триггернула экшен
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          host: 94.130.111.231
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Разрешаем проброс переменной BRANCH_NAME в SSH-сессию
          envs: BRANCH_NAME
          script: |
            # Abort the script if any command fails
            set -e

            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            # Navigate to project
            cd /var/www/attorney-site

            # Fetch all branches and checkout the one that triggered the action
            git fetch origin
            git checkout $BRANCH_NAME
            git pull origin $BRANCH_NAME

            # Build Frontend
            cd frontend
            npm install
            npm run build
            cd ..

            # Restart PM2 processes
            pm2 restart lawyer-nuxt
            pm2 restart lawyer-api
